<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Image Batch Editor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app-shell">
    <div class="top-banner">
      <h1>로컬 이미지 일괄 보정 도구</h1>
      <p>
        이미지는 브라우저에서만 처리됩니다. 파일은 외부 서버로 업로드되지 않습니다.
        최종 저장은 원본 해상도로 처리됩니다.
      </p>
    </div>

    <div class="grid-layout">
      <div class="panel">
        <h2>업로드</h2>
        <div class="upload-box">
          <div id="drop-zone" class="drop-zone">
            <strong>이미지 파일을 드래그하거나 파일 선택 버튼을 눌러주세요</strong>
            <p>지원 형식: jpg, jpeg, png, webp</p>
            <p>원본 해상도가 보존됩니다.</p>
            <button id="file-select-btn" type="button">파일 선택</button>
          </div>
          <input id="file-input" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden>
        </div>
        <div id="thumbnail-section" style="margin-top: 28px;">
          <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
            <h2>업로드 이미지</h2>
            <button id="clear-all-btn" type="button" class="secondary-button" disabled>전체 삭제</button>
          </div>
          <p id="file-count" style="color: #9aa5ba; margin: 10px 0 14px;">이미지 0장</p>
          <div id="thumbnail-list" class="thumbnail-list"></div>
        </div>
      </div>

      <div class="panel preview-shell">
        <h2>미리보기</h2>
        <div id="preview-area" class="preview-area">
          <canvas id="before-canvas" style="display: none;"></canvas>
          <canvas id="after-canvas" style="display: none;"></canvas>
          <div class="empty-preview" style="color: #9aa5ba; text-align: center; padding: 24px;">
            업로드된 이미지가 없습니다.
          </div>
        </div>
        <div class="preview-status" style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
          <div>
            <strong id="preview-title">선택된 이미지 없음</strong>
            <div id="preview-status-text" style="color: #9aa5ba; margin-top: 6px;">원본과 편집본 비교 중</div>
          </div>
        </div>
      </div>

      <div class="panel">
        <h2>조정</h2>
        <div class="adjust-control">
          <div class="adjust-row">
            <div class="adjust-header">
              <span>밝기</span>
              <span id="brightness-value" class="value">0</span>
            </div>
            <div class="adjust-input-row">
              <input id="brightness-slider" type="range" min="-100" max="100" value="0">
              <button id="brightness-reset" type="button" class="reset-single">리셋</button>
            </div>
          </div>
          <div class="adjust-row">
            <div class="adjust-header">
              <span>채도</span>
              <span id="saturation-value" class="value">0</span>
            </div>
            <div class="adjust-input-row">
              <input id="saturation-slider" type="range" min="-100" max="100" value="0">
              <button id="saturation-reset" type="button" class="reset-single">리셋</button>
            </div>
          </div>
          <div class="adjust-row">
            <div class="adjust-header">
              <span>선명도</span>
              <span id="sharpness-value" class="value">0</span>
            </div>
            <div class="adjust-input-row">
              <input id="sharpness-slider" type="range" min="0" max="100" value="0">
              <button id="sharpness-reset" type="button" class="reset-single">리셋</button>
            </div>
          </div>
        </div>
        <div style="display: flex; justify-content: flex-end; margin-top: 14px; gap: 10px;">
          <button id="compare-btn" type="button" style="background: linear-gradient(135deg, #5eb5ff, #2f7bff); color: #fff; padding: 8px 12px; font-weight: 600;">누르고 있기: Before 비교</button>
        </div>

        <div class="action-buttons">
          <button id="apply-all-btn" type="button" class="primary-button" disabled>전체 적용 및 다운로드</button>
        </div>
      </div>
    </div>

    <div id="progress-overlay" class="progress-overlay" style="display: none;">
      <div class="progress-card">
        <h3>일괄 처리 중입니다</h3>
        <div class="progress-bar">
          <span id="progress-fill"></span>
        </div>
        <div id="progress-meta" class="progress-meta">0 / 0 처리 중</div>
        <div id="error-list" class="error-list" style="display: none;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/file-saver/2.0.5/FileSaver.min.js"></script>
  <script src="app.js" defer></script>
</body>
</html>
